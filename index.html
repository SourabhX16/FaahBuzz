<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faah Buzzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="min-h-screen w-full bg-white relative overflow-hidden">
    <!-- Soft Lavender Center Glow -->
    <div 
      class="absolute inset-0 z-0 pointer-events-none" 
      style="background-image: radial-gradient(circle at center, #c4b5fd, transparent);">
    </div>
    
    <!-- Content -->
    <div class="relative z-10 flex flex-col items-center justify-center min-h-screen gap-8">
      <button id="buzzer" class="px-16 py-8 text-4xl font-bold text-white bg-purple-600 rounded-full shadow-2xl hover:bg-purple-700 active:scale-95 transition-transform">
        FAAH BUZZER
      </button>
      <div id="counter" class="text-6xl font-bold text-purple-800">0</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
